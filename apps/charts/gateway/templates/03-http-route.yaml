apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
 name: {{ .Values.apiSample.name }}-route
 namespace: {{ .Values.apiSample.namespace }}
 annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
 parentRefs:
   - group: gateway.networking.k8s.io
     kind: Gateway
     name: {{ .Values.gateway.name }}
     namespace: {{ .Values.gateway.namespace }}
 rules:
   - backendRefs:
       - group: ''
         kind: Service
         name: {{ .Values.apiSample.name }}
         namespace: {{ .Values.apiSample.namespace }}
         port: {{ .Values.apiSample.servicePort }}
         weight: 1
     matches:
       - path:
           type: PathPrefix
           value: /