apiVersion: batch/v1
kind: Job
metadata:
  name: generate-tempo-secret
  namespace: tempo
  annotations:
    # Este hook le dice a ArgoCD que ejecute el script DURANTE la sincronización
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: tempo-secret-creator-sa # Necesita permisos para leer/crear secrets
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest # Imagen ligera con kubectl/oc
          command:
            - /bin/bash
            - -c
            - |
              echo "Extrayendo datos de tempo-bucket..."
              BUCKET_NAME=$(kubectl get configmap tempo-bucket -n tempo -o jsonpath='{.data.BUCKET_NAME}')
              BUCKET_HOST=$(kubectl get configmap tempo-bucket -n tempo -o jsonpath='{.data.BUCKET_HOST}')
              BUCKET_PORT=$(kubectl get configmap tempo-bucket -n tempo -o jsonpath='{.data.BUCKET_PORT}')
              
              # En Kubernetes, puedes copiar directamente de secret a secret sin decodificar manualmente
              AWS_ACCESS_KEY_ID=$(kubectl get secret tempo-bucket -n tempo -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
              AWS_SECRET_ACCESS_KEY=$(kubectl get secret tempo-bucket -n tempo -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)

              # Borrar el secret anterior si existe para evitar conflictos
              kubectl delete secret tempo-bucket-secret -n tempo --ignore-not-found

              # Crear el nuevo secret compuesto
              kubectl create secret generic tempo-bucket-secret -n tempo \
                --from-literal=endpoint="https://${BUCKET_HOST}:${BUCKET_PORT}" \
                --from-literal=bucket="${BUCKET_NAME}" \
                --from-literal=access_key_id="${AWS_ACCESS_KEY_ID}" \
                --from-literal=access_key_secret="${AWS_SECRET_ACCESS_KEY}"