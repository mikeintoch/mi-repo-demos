---
kind: Kuadrant
apiVersion: kuadrant.io/v1beta1
metadata:
 name: {{ .Values.kuadrant.name }}
 namespace: {{ .Values.kuadrant.namespace }}
 annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  components:
    developerPortal:
      enabled: true 
  observability:
    enable: true
    dataPlane:
      defaultLevels:
        - debug: "true"
      httpHeaderIdentifier: x-request-id
    tracing:
      defaultEndpoint: rpc://otel-collector.tempo.svc.cluster.local:4317
      insecure: true
...