---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sync-bucket-binding
  namespace: {{ .Values.gitlab.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "6"
subjects:
  - kind: ServiceAccount
    name: sync-bucket-sa
    namespace: {{ .Values.gitlab.namespace }}
roleRef:
  kind: Role
  name: sync-bucket-role
  apiGroup: rbac.authorization.k8s.io
...