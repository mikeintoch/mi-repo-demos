---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config-rhdh
  namespace: {{ .Values.rhdh.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  app-config.yaml: |
    auth:
      environment: development
    app:
      title: Portal de Desarrolladores - RHCL Demo
      baseUrl: https://rhdh.{{ .Values.clusterDomain }}

    backend:
      baseUrl: https://rhdh.{{ .Values.clusterDomain }}
      auth:
        - type: static
          options:
            subject: api-clients
            token: ${BACKEND_SECRET}
      cors:
        origin: https://rhdh.{{ .Values.clusterDomain }}